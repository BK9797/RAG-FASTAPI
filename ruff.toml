line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long (handled by formatter / acceptable for prompts)
]

[lint.per-file-ignores]
"tests/*" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
